# Copy this to .streamlit/secrets.toml for local development
# (never commit secrets.toml to git)
[snowflake]
account   = "yourorg-youraccountname"   # e.g. "ab12345.eu-west-1"
user      = "your.email@company.com"
password  = "your_password"
warehouse = "COMPUTE_WH"
database  = "YOUR_DATABASE"
schema    = "YOUR_SCHEMA"               # schema containing the three QA tables
